# Development Docker Compose configuration
# Optimized for fast rebuilds and hot reload
# Usage: docker compose -f docker-compose.dev.yml up

services:
  # Astro development server with hot reload
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4321:4321"
    volumes:
      # Mount source code for hot reload
      - ./src:/app/src:delegated
      - ./public:/app/public:delegated
      - ./astro.config.dev.mjs:/app/astro.config.mjs:delegated
      - ./tailwind.config.mjs:/app/tailwind.config.mjs:delegated
      - ./tsconfig.json:/app/tsconfig.json:delegated
      - ./package.json:/app/package.json:delegated
      - ./.env.local:/app/.env.local:delegated
      # Persist node_modules in a volume to avoid conflicts
      - node_modules:/app/node_modules
      # Use local directory for .astro cache to avoid permission issues
      - ./.astro-docker:/app/.astro:delegated
    environment:
      - NODE_ENV=development
      - PUBLIC_SUPABASE_URL=http://localhost:54321
      - PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOuoJeHxjNa-NEHl7qWa00fNKZdJ9rHxs9eA
      - PUBLIC_STRAPI_URL=http://localhost:1337
      # Database read-only user configuration
      - DB_READONLY_USER=spicebush_readonly
      - DB_READONLY_PASSWORD=6afRf15M187YKF88UpWYJsn4zijsNiQMZmQVOK9Rdyw=
      - DB_READONLY_HOST=supabase-db
      - DB_READONLY_PORT=5432
      - DB_READONLY_DATABASE=postgres
      # Astro specific configs for better hot reload
      - FORCE_COLOR=1
      - ASTRO_TELEMETRY_DISABLED=1
    depends_on:
      supabase-db:
        condition: service_healthy
    networks:
      - spicebush-network
    restart: unless-stopped
    # Better logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Supabase Local Stack (minimal services for development)
  supabase-db:
    image: supabase/postgres:15.1.1.78
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    restart: unless-stopped
    ports:
      - "54322:5432"
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: your-super-secret-and-long-postgres-password
      POSTGRES_PASSWORD: your-super-secret-and-long-postgres-password
      PGDATABASE: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      JWT_EXP: 3600
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # IMPORTANT: Files are executed in alphabetical order
      - ./docker/volumes/db/00-supabase-users.sql:/docker-entrypoint-initdb.d/00-supabase-users.sql:Z
      - ./docker/volumes/db/01-auth-schema.sql:/docker-entrypoint-initdb.d/01-auth-schema.sql:Z
      # Note: jwt.sql, realtime.sql, webhooks.sql, roles.sql are empty directories, not files
      # - ./docker/volumes/db/jwt.sql:/docker-entrypoint-initdb.d/01-jwt.sql:Z
      # - ./docker/volumes/db/realtime.sql:/docker-entrypoint-initdb.d/02-realtime.sql:Z
      # - ./docker/volumes/db/webhooks.sql:/docker-entrypoint-initdb.d/03-webhooks.sql:Z
      # - ./docker/volumes/db/roles.sql:/docker-entrypoint-initdb.d/04-roles.sql:Z
      - ./supabase/migrations:/docker-entrypoint-initdb.d/migrations:Z
    networks:
      - spicebush-network

  supabase-kong:
    image: kong:2.8.1
    restart: unless-stopped
    ports:
      - "54321:8000"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl,basic-auth
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
    volumes:
      - ./docker/volumes/api/kong.yml:/var/lib/kong/kong.yml:ro
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
      supabase-storage:
        condition: service_started
    networks:
      - spicebush-network

  supabase-auth:
    image: supabase/gotrue:v2.158.1
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:your-super-secret-and-long-postgres-password@supabase-db:5432/postgres
      GOTRUE_SITE_URL: http://localhost:4321
      GOTRUE_URI_ALLOW_LIST: "http://localhost:4321,http://localhost:3000"
      GOTRUE_DISABLE_SIGNUP: false
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_MAILER_AUTOCONFIRM: true  # Auto-confirm for development
      GOTRUE_SMTP_HOST: mailhog
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_ADMIN_EMAIL: admin@spicebushmontessori.test
    networks:
      - spicebush-network

  supabase-rest:
    image: postgrest/postgrest:v12.2.0
    depends_on:
      supabase-db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://supabase_admin:your-super-secret-and-long-postgres-password@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_APP_SETTINGS_JWT_EXP: 3600
    networks:
      - spicebush-network

  supabase-storage:
    image: supabase/storage-api:v0.40.4
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOuoJeHxjNa-NEHl7qWa00fNKZdJ9rHxs9eA
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: your-super-secret-jwt-token-with-at-least-32-characters-long
      DATABASE_URL: postgres://supabase_storage_admin:your-super-secret-and-long-postgres-password@supabase-db:5432/postgres
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: stub
      GLOBAL_S3_BUCKET: stub
    volumes:
      - storage_data:/var/lib/storage
    networks:
      - spicebush-network

  # Email testing service for development
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI to view emails
    networks:
      - spicebush-network

  # Optional: Supabase Studio (only if needed)
  # Uncomment if you want the Supabase Studio interface
  # supabase-studio:
  #   image: supabase/studio:20240422-5cf8f30
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     STUDIO_PG_META_URL: http://supabase-db:5432
  #     POSTGRES_PASSWORD: your-super-secret-and-long-postgres-password
  #     SUPABASE_URL: http://localhost:54321
  #     SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOuoJeHxjNa-NEHl7qWa00fNKZdJ9rHxs9eA
  #   depends_on:
  #     - supabase-db
  #   networks:
  #     - spicebush-network

networks:
  spicebush-network:
    driver: bridge

volumes:
  node_modules:
  postgres_data:
  storage_data: