version: '3.8'

services:
  # Main Astro application
  app:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./.env.local:/app/.env.local:ro
      - ./astro.config.dev.mjs:/app/astro.config.mjs:ro
    environment:
      - NODE_ENV=development
      - NETLIFY_DATABASE_URL=${NETLIFY_DATABASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - PUBLIC_SITE_URL=${PUBLIC_SITE_URL}
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spicebush-network

  # Email testing (for development)
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    networks:
      - spicebush-network

networks:
  spicebush-network:
    driver: bridge

# Simplified development stack: app + mail testing.
