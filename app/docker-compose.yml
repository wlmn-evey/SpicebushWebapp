version: '3.8'

services:
  # Main Astro application
  app:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./.env.local:/app/.env.local:ro
    environment:
      - NODE_ENV=development
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spicebush-network

  # Email testing (for development)
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    networks:
      - spicebush-network

networks:
  spicebush-network:
    driver: bridge

# Simplified from 11+ services to just 2!
# All Supabase services now use hosted instance