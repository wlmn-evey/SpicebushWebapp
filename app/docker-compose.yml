version: '3.8'

services:
  # Main Astro application
  app:
    build: .
    ports:
      - "4321:4321"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./.env.local:/app/.env.local:ro
      - ./astro.config.dev.mjs:/app/astro.config.mjs:ro
    environment:
      - NODE_ENV=development
      # Supabase hosted instance configuration
      - PUBLIC_SUPABASE_URL=${PUBLIC_SUPABASE_URL}
      - PUBLIC_SUPABASE_ANON_KEY=${PUBLIC_SUPABASE_ANON_KEY}
      - PUBLIC_SUPABASE_PUBLIC_KEY=${PUBLIC_SUPABASE_PUBLIC_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Database connection
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      # Read-only database connection
      - DB_READONLY_HOST=${DB_READONLY_HOST}
      - DB_READONLY_PORT=${DB_READONLY_PORT}
      - DB_READONLY_DATABASE=${DB_READONLY_DATABASE}
      - DB_READONLY_USER=${DB_READONLY_USER}
      - DB_READONLY_PASSWORD=${DB_READONLY_PASSWORD}
    command: npm run dev -- --host 0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4321/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - spicebush-network

  # Email testing (for development)
  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP
    networks:
      - spicebush-network

networks:
  spicebush-network:
    driver: bridge

# Simplified from 11+ services to just 2!
# All Supabase services now use hosted instance