# Minimal test configuration to verify Docker setup
# Uses the optimized Dockerfile for faster testing

services:
  # Test the Astro app container
  app:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: development
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PUBLIC_SUPABASE_URL=http://localhost:54321
      - PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOuoJeHxjNa-NEHl7qWa00fNKZdJ9rHxs9eA
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4321"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Minimal Supabase setup for testing
  supabase-db:
    image: supabase/postgres:15.1.1.78
    environment:
      POSTGRES_PASSWORD: test-password
      POSTGRES_DB: postgres
    ports:
      - "54322:5432"
    healthcheck:
      test: pg_isready -U postgres -h localhost
      interval: 5s
      timeout: 5s
      retries: 10