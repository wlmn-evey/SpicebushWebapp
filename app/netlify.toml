# Netlify Configuration for Spicebush Testing Site

[build]
  # Base directory (override parent config when running from app directory)
  base = "."
  
  # Build command that includes environment variables
  command = "chmod +x build-with-env.sh && ./build-with-env.sh"
  
  # Directory to deploy (Astro outputs to dist/)
  publish = "dist"
  
  # Node version and other environment settings
  [build.environment]
    NODE_VERSION = "20"
    NODE_OPTIONS = "--max_old_space_size=4096"
    # Netlify Identity configuration
    NETLIFY_IDENTITY_ENABLED = "true"

# Testing branch context - ensures proper environment setup
[context.testing]
  [context.testing.environment]
    NODE_ENV = "production"
    ENVIRONMENT = "testing"

# Branch deploy context (all other branches)
[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "development"

# Deploy preview context
[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "development"

# Production context
[context.production]
  [context.production.environment]
    NODE_ENV = "production"
    ENVIRONMENT = "production"

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    X-Permitted-Cross-Domain-Policies = "none"
    
    # Content Security Policy (includes Stripe, Supabase, and Netlify Identity domains)
    Content-Security-Policy = """
      default-src 'self'; 
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://challenges.cloudflare.com https://*.supabase.co https://identity.netlify.com https://netlify-cdp-loader.netlify.app; 
      style-src 'self' 'unsafe-inline' https://identity.netlify.com; 
      img-src 'self' data: https: blob:; 
      font-src 'self' data:; 
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://*.unione.io https://identity.netlify.com /.netlify/identity/; 
      frame-src 'self' https://js.stripe.com https://challenges.cloudflare.com https://hooks.stripe.com https://identity.netlify.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests
    """
    
    # HSTS (enable for production with HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache optimization for static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# 404 page handling
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

# Functions directory (if using Netlify Functions)
[functions]
  directory = "netlify/functions"
  
# Build plugins for enhanced functionality
[[plugins]]
  package = "@netlify/plugin-functions-install-core"