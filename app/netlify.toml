# Netlify Configuration for Spicebush Montessori
#
# IMPORTANT: Environment Variables
# Set these in Netlify Dashboard > Site Settings > Environment Variables:
#
# Required for Production:
# - PUBLIC_SUPABASE_URL
# - PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - DATABASE_URL
# - DIRECT_URL
# - ADMIN_EMAIL
# - SITE_URL (usually auto-set by Netlify)
#
# Optional but Recommended:
# - SENDGRID_API_KEY (for email notifications)
# - STRIPE_SECRET_KEY (for payments)
# - STRIPE_WEBHOOK_SECRET (for payment webhooks)
# - SENTRY_DSN (for error tracking)

[build]
  # Build command
  command = "npm run build"
  
  # Directory to deploy (Astro outputs to dist/)
  publish = "dist"
  
  # Node version
  environment = { NODE_VERSION = "20" }

[build.environment]
  # Ensure npm doesn't look for a workspace root
  NPM_FLAGS = "--prefix=/dev/null"

# Production context
[context.production]
  environment = { NODE_ENV = "production" }
  
  # Production build command with type checking
  command = "npm run build"

# Branch deploy context
[context.branch-deploy]
  environment = { NODE_ENV = "development" }

# Deploy preview context
[context.deploy-preview]
  environment = { NODE_ENV = "development" }

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    
    # Content Security Policy (adjust domains as needed)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src https://challenges.cloudflare.com"
    
    # HSTS (enable for production with HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache control for static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
# Force HTTPS
[[redirects]]
  from = "http://:domain/*"
  to = "https://:domain/:splat"
  status = 301
  force = true

# Remove trailing slashes
[[redirects]]
  from = "/*/"
  to = "/:splat"
  status = 301

# Admin area protection (handled by middleware, but good to have)
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  conditions = {Role = ["admin"]}
  force = false

# 404 page
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

# Functions directory (if using Netlify Functions)
[functions]
  directory = "netlify/functions"

# Plugins
[[plugins]]
  # Lighthouse CI
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs]
    # Performance budget
    performance = 0.9
    accessibility = 0.9
    best-practices = 0.9
    seo = 0.9

# Forms (Netlify Forms - optional)
[forms]
  # If you want to use Netlify Forms for contact forms
  # Otherwise, forms will use your configured email service