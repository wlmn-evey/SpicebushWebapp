# Netlify Configuration for Spicebush Montessori
#
# IMPORTANT: Environment Variables
# Set these in Netlify Dashboard > Site Settings > Environment Variables:
#
# Required for Production:
# - PUBLIC_SITE_URL (site domain - e.g., https://spicebushmontessori.org)
# - PUBLIC_SUPABASE_URL
# - PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - DATABASE_URL
# - DIRECT_URL
# - ADMIN_EMAIL
# - SITE_URL (usually auto-set by Netlify)
#
# Required for Stripe Payments:
# - PUBLIC_STRIPE_PUBLISHABLE_KEY (your Stripe publishable key)
# - STRIPE_SECRET_KEY (your Stripe secret or restricted key)
# - STRIPE_WEBHOOK_SECRET (webhook signing secret from Stripe)
#
# Optional but Recommended:
# - SENDGRID_API_KEY (for email notifications)
# - SENTRY_DSN (for error tracking)

[build]
  # Build command
  command = "npm run build"
  
  # Directory to deploy (Astro outputs to dist/)
  publish = "dist"
  
  # Node version and other environment settings
  environment = { NODE_VERSION = "20", NPM_FLAGS = "--prefix=/dev/null" }

# Production context
[context.production]
  environment = { NODE_ENV = "production" }
  
  # Production build command with type checking
  command = "npm run build"

# Branch deploy context
[context.branch-deploy]
  environment = { NODE_ENV = "development" }

# Deploy preview context
[context.deploy-preview]
  environment = { NODE_ENV = "development" }

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    
    # Content Security Policy (includes Stripe domains)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com; frame-src 'self' https://js.stripe.com https://challenges.cloudflare.com"
    
    # HSTS (enable for production with HTTPS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# Cache control for static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects
# Force HTTPS (commented out for development to avoid redirect loops)
# [[redirects]]
#   from = "http://:domain/*"
#   to = "https://:domain/:splat"
#   status = 301
#   force = true

# Remove trailing slashes (commented out for development to avoid redirect loops)
# [[redirects]]
#   from = "/*/"
#   to = "/:splat"
#   status = 301

# Admin area protection (handled by middleware, but good to have)
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  conditions = {Role = ["admin"]}
  force = false

# 404 page
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

# Functions directory (if using Netlify Functions)
[functions]
  directory = "netlify/functions"

# Plugins
[[plugins]]
  # Lighthouse CI
  package = "@netlify/plugin-lighthouse"
  
  [plugins.inputs]
    # Performance budget
    performance = 0.9
    accessibility = 0.9
    best-practices = 0.9
    seo = 0.9

# Forms (Netlify Forms - optional)
[forms]
  # If you want to use Netlify Forms for contact forms
  # Otherwise, forms will use your configured email service