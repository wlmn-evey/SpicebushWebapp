<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tour Form Test</title>
</head>
<body>
    <h1>Tour Scheduling Form Test</h1>
    
    <h2>Test 1: Page Load</h2>
    <iframe src="http://localhost:4321/admissions/schedule-tour" width="100%" height="600" id="page-test"></iframe>
    
    <h2>Test 2: API Endpoint</h2>
    <button onclick="testAPI()">Test API Submission</button>
    <pre id="api-result"></pre>
    
    <script>
        // Check if page loads
        document.getElementById('page-test').onload = function() {
            console.log('✅ Page loaded successfully');
        };
        
        document.getElementById('page-test').onerror = function() {
            console.error('❌ Page failed to load');
        };
        
        // Test API
        async function testAPI() {
            const result = document.getElementById('api-result');
            
            try {
                const response = await fetch('http://localhost:4321/api/schedule-tour', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        parentName: 'Test Parent',
                        email: 'test@example.com',
                        phone: '(555) 123-4567',
                        childAge: '4',
                        preferredTimes: 'Any time',
                        questions: 'Test submission',
                        schoolEmail: 'info@spicebushmontessori.org'
                    })
                });
                
                const data = await response.json();
                result.textContent = '✅ API Response: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = '❌ API Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
