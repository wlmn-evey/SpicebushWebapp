<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Image Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
        }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        .progress-fill {
            height: 100%;
            background: #4CAF50;
            width: 0%;
            transition: width 0.3s ease;
        }
        .error {
            color: red;
            margin: 10px 0;
        }
        .success {
            color: green;
            margin: 10px 0;
        }
        #preview {
            max-width: 300px;
            margin: 20px auto;
        }
        #preview img {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <h1>Test Image Upload</h1>
    
    <div class="upload-area" id="uploadArea">
        <p>Click to select an image or drag and drop</p>
        <input type="file" id="fileInput" accept="image/*" style="display: none">
    </div>
    
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div id="progressText"></div>
    <div id="message"></div>
    <div id="preview"></div>
    
    <h2>Test Results:</h2>
    <pre id="testResults"></pre>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const message = document.getElementById('message');
        const preview = document.getElementById('preview');
        const testResults = document.getElementById('testResults');
        
        let testLog = [];
        
        function log(msg) {
            testLog.push(`[${new Date().toISOString()}] ${msg}`);
            testResults.textContent = testLog.join('\n');
        }
        
        // Click to upload
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });
        
        // File selection
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                log(`File selected: ${file.name} (${file.type}, ${(file.size / 1024 / 1024).toFixed(2)}MB)`);
                uploadFile(file);
            }
        });
        
        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#4CAF50';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.borderColor = '#ccc';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ccc';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                log(`File dropped: ${file.name} (${file.type}, ${(file.size / 1024 / 1024).toFixed(2)}MB)`);
                uploadFile(file);
            }
        });
        
        function uploadFile(file) {
            // Validate file
            const validTypes = ['image/jpeg', 'image/png', 'image/webp', 'image/gif'];
            if (!validTypes.includes(file.type)) {
                showError('Invalid file type. Please upload a JPG, PNG, WebP, or GIF image.');
                log(`ERROR: Invalid file type: ${file.type}`);
                return;
            }
            
            if (file.size > 10 * 1024 * 1024) {
                showError('File too large. Maximum size is 10MB.');
                log(`ERROR: File too large: ${(file.size / 1024 / 1024).toFixed(2)}MB`);
                return;
            }
            
            // Check dimensions
            const img = new Image();
            const reader = new FileReader();
            
            reader.onload = (e) => {
                img.onload = () => {
                    log(`Image dimensions: ${img.width}x${img.height}`);
                    
                    if (img.width < 200 || img.height < 200) {
                        showError('Image too small. Minimum size is 200x200 pixels.');
                        log(`ERROR: Image too small`);
                        return;
                    }
                    
                    if (img.width > 4000 || img.height > 4000) {
                        showError('Image too large. Maximum size is 4000x4000 pixels.');
                        log(`ERROR: Image too large`);
                        return;
                    }
                    
                    // Proceed with upload
                    performUpload(file);
                };
                
                img.src = e.target.result;
            };
            
            reader.readAsDataURL(file);
        }
        
        function performUpload(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            const xhr = new XMLHttpRequest();
            
            // Progress tracking
            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.display = 'block';
                    progressFill.style.width = percentComplete + '%';
                    progressText.textContent = `Uploading... ${percentComplete}%`;
                    log(`Upload progress: ${percentComplete}%`);
                }
            });
            
            // Load event
            xhr.addEventListener('load', () => {
                progressBar.style.display = 'none';
                progressText.textContent = '';
                
                log(`Upload complete. Status: ${xhr.status}`);
                log(`Response: ${xhr.responseText}`);
                
                if (xhr.status === 200) {
                    try {
                        const response = JSON.parse(xhr.responseText);
                        showSuccess('Upload successful!');
                        
                        if (response.url) {
                            preview.innerHTML = `<img src="${response.url}" alt="Uploaded image">`;
                            log(`Image URL: ${response.url}`);
                        }
                    } catch (e) {
                        showError('Invalid response from server');
                        log(`ERROR: Failed to parse response: ${e.message}`);
                    }
                } else {
                    const errorMessages = {
                        400: 'Invalid file format. Please upload a valid image.',
                        401: 'Authentication required. Please log in and try again.',
                        413: 'File too large. Please choose a smaller image.',
                        415: 'Unsupported file type. Please upload a JPG, PNG, WebP, or GIF.',
                        500: 'Server error. Please try again later.',
                        507: 'Storage full. Please contact support.'
                    };
                    
                    const errorMsg = errorMessages[xhr.status] || `Upload failed (${xhr.status})`;
                    showError(errorMsg);
                    log(`ERROR: ${errorMsg}`);
                }
            });
            
            // Error event
            xhr.addEventListener('error', () => {
                showError('Network error. Please check your connection and try again.');
                log('ERROR: Network error during upload');
                progressBar.style.display = 'none';
                progressText.textContent = '';
            });
            
            // Send request
            log('Starting upload to /api/media/upload');
            xhr.open('POST', '/api/media/upload');
            
            // Set auth cookie for testing
            document.cookie = 'sbms-admin-auth=bypass; path=/';
            
            xhr.send(formData);
        }
        
        function showError(msg) {
            message.innerHTML = `<div class="error">${msg}</div>`;
        }
        
        function showSuccess(msg) {
            message.innerHTML = `<div class="success">${msg}</div>`;
        }
        
        // Initial log
        log('Image upload test page loaded');
        log('Ready to test upload functionality');
    </script>
</body>
</html>
