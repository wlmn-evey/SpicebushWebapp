# Development overrides for docker-compose.yml
# This file is automatically loaded by docker-compose and overrides values in docker-compose.yml

services:
  # For local development, expose Strapi on host
  strapi:
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
    command: ["npm", "run", "develop"]

  # PostgreSQL port for Strapi (for debugging)
  strapi-db:
    ports:
      - "5433:5432"  # Different port to avoid conflict with Supabase