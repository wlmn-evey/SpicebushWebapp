name: Validate Secrets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Check PUBLIC_SUPABASE_URL
      env:
        SECRET_VALUE: ${{ secrets.PUBLIC_SUPABASE_URL }}
      run: |
        if [ -z "$SECRET_VALUE" ]; then
          echo "⚠️  PUBLIC_SUPABASE_URL is not set (will use fallback in CI)"
        else
          echo "✅ PUBLIC_SUPABASE_URL is configured"
          # Basic URL format validation
          if [[ $SECRET_VALUE =~ ^https?:// ]]; then
            echo "✅ URL format appears valid"
          else
            echo "⚠️  URL format may be invalid"
          fi
        fi
    
    - name: Check PUBLIC_SUPABASE_ANON_KEY  
      env:
        SECRET_VALUE: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
      run: |
        if [ -z "$SECRET_VALUE" ]; then
          echo "⚠️  PUBLIC_SUPABASE_ANON_KEY is not set (will use fallback in CI)"
        else
          echo "✅ PUBLIC_SUPABASE_ANON_KEY is configured"
          # Basic JWT format validation
          if [[ $SECRET_VALUE =~ ^eyJ ]]; then
            echo "✅ Key format appears to be JWT"
          else
            echo "⚠️  Key format may be invalid"
          fi
        fi
    
    - name: Setup Node.js for connection test
      if: env.PUBLIC_SUPABASE_URL != '' && env.PUBLIC_SUPABASE_ANON_KEY != ''
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'app/package-lock.json'
      env:
        PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
        PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
    
    - name: Test basic setup
      run: |
        cd app
        npm ci --prefer-offline --no-audit
        echo "✅ Dependencies installed successfully"
    
    - name: Summary
      run: |
        echo "📋 Secret validation summary:"
        echo "- Secrets can be missing for initial setup"
        echo "- Workflows will use fallback values when secrets are missing"
        echo "- Configure secrets in GitHub repository settings for full functionality"
        echo ""
        echo "🎉 Validation completed successfully!"