name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'app/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd app
        npm ci
    
    - name: Run security audit
      run: |
        cd app
        npm audit --audit-level=moderate
    
    - name: Check for known vulnerabilities
      run: |
        cd app
        npm audit --json > audit-results.json || true
        # Continue even if vulnerabilities found for reporting
    
    - name: Upload audit results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-audit-results
        path: app/audit-results.json
        retention-days: 30

  code-scanning:
    name: CodeQL Code Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: typescript, javascript
        config-file: ./.github/codeql-config.yml
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: 'app/package-lock.json'
    
    - name: Install dependencies
      run: |
        cd app
        npm ci
    
    - name: Build application
      run: |
        cd app
        npm run build 2>/dev/null || echo "Build failed as expected (no adapter)"
      env:
        PUBLIC_SUPABASE_URL: "dummy-url-for-build"
        PUBLIC_SUPABASE_ANON_KEY: "dummy-key-for-build"
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3