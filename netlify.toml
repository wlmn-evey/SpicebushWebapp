# Root Netlify Configuration for Spicebush Testing Site

[build]
  # Build command for Astro app in root directory
  command = "npm run build"
  
  # Build optimization settings
  [build.processing]
    skip_processing = false
  [build.processing.css]
    bundle = true
    minify = true
  [build.processing.js]
    bundle = true
    minify = true
  
  # Directory to deploy (relative to app directory where build runs)
  publish = "dist"
  
  # Node version and other environment settings
  [build.environment]
    NODE_VERSION = "20"
    NODE_OPTIONS = "--max_old_space_size=4096"
    # Netlify Identity disabled (using Clerk)
    NETLIFY_IDENTITY_ENABLED = "false"
    # Authentication feature flags with safe defaults
    USE_CLERK_AUTH = "clerk"
    USE_REAL_CLERK_VALIDATION = "true"
    COMING_SOON_MODE = "false"

# Testing branch context - ensures proper environment setup
[context.testing]
  [context.testing.environment]
    NODE_ENV = "production"
    ENVIRONMENT = "testing"

# Branch deploy context (all other branches)
[context.branch-deploy]
  [context.branch-deploy.environment]
    NODE_ENV = "development"

# Deploy preview context
[context.deploy-preview]
  [context.deploy-preview.environment]
    NODE_ENV = "development"

# Headers for better performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    
# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirects configuration 
[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/auth/*"
  to = "/auth/:splat"
  status = 200
  force = false

# Functions configuration
[functions]
  directory = "netlify/functions"
